<!-- Standard HandsViet Loading Screen -->
<div id="pageLoader" class="fixed inset-0 z-[100] flex items-center justify-center bg-white transition-opacity duration-700">
    <div class="flex flex-col items-center gap-4">
        <div class="relative flex items-center justify-center w-20 h-20 bg-teal-500/10 rounded-full loader-pulse">
            <svg class="w-10 h-10 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h3l2-4 2 8 2-4h3"></path>
            </svg>
            <div class="absolute inset-0 border-4 border-teal-500/30 rounded-full pulse-ring"></div>
        </div>
        <p class="text-teal-500 font-medium tracking-wider loader-text">HandsViet...</p>
    </div>
</div>

<script>
    // Managed Loading Screen reveal
    (function() {
        let startTime = Date.now();
        window.addEventListener('load', function() {
            const loader = document.getElementById('pageLoader');
            if (loader) {
                const elapsedTime = Date.now() - startTime;
                const minTime = 600; // Minimum visibility time for smooth transition
                const delay = Math.max(0, minTime - elapsedTime);
                
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                    }, 700);
                }, delay);
            }
        });
    })();
</script>
