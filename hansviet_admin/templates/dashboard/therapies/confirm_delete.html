{% extends 'dashboard/base.html' %}
{% block title %}Xóa liệu pháp{% endblock %}
{% block breadcrumbs %}
<a href="{% url 'dashboard:therapy_list' %}" class="text-slate-500 hover:text-teal-600">Liệu pháp PHCN</a>
{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-[2rem] border border-rose-100 shadow-sm p-8">
        <h1 class="text-2xl font-extrabold text-slate-900 mb-3">Xóa gói liệu pháp</h1>
        <p class="text-slate-500 mb-6">Bạn có chắc muốn xóa gói <strong>{{ package.name }}</strong>?</p>
        <form method="post" class="flex items-center gap-3">
            {% csrf_token %}
            <button class="bg-rose-600 hover:bg-rose-700 text-white px-6 py-3 rounded-xl font-bold">Xóa</button>
            <a href="{% url 'dashboard:therapy_list' %}" class="px-6 py-3 rounded-xl border border-slate-200 font-bold text-slate-600 hover:bg-slate-50">Hủy</a>
        </form>
    </div>
</div>
{% endblock %}
