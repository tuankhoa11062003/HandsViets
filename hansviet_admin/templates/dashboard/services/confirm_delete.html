{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận xóa - HandsViet Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 flex items-center justify-center min-h-screen p-4">
    <div
        class="max-w-md w-full bg-white rounded-3xl shadow-2xl border border-gray-100 p-8 text-center animate-in fade-in zoom-in duration-300">
        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                </path>
            </svg>
        </div>

        <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Xác nhận xóa?</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Bạn có chắc chắn muốn xóa dịch vụ <span class="font-bold text-gray-900">"{{ service.title }}"</span>? Hành
            động này không thể hoàn tác.
        </p>

        <form method="post" class="flex flex-col gap-3">
            {% csrf_token %}
            <button type="submit"
                class="w-full bg-red-500 hover:bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-red-100 transition-all active:scale-95">
                Đồng ý xóa
            </button>
            <a href="{% url 'dashboard:service_list' %}"
                class="w-full bg-gray-50 hover:bg-gray-100 text-gray-600 py-4 rounded-xl font-bold transition-all">
                Hủy quay lại
            </a>
        </form>
    </div>
</body>

</html>
